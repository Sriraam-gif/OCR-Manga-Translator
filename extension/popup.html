<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <style>
      body { width: 260px; font: 13px system-ui, sans-serif; padding: 12px; }
      h1 { font-size: 14px; margin: 0 0 8px; }
      label { display: block; font-size: 11px; color: #555; margin: 8px 0 2px; }
      input { width: 100%; box-sizing: border-box; padding: 5px; font-size: 12px; }
      button { width: 100%; margin-top: 10px; padding: 8px; font-size: 13px;
               background: #2563eb; color: #fff; border: 0; border-radius: 6px; cursor: pointer; }
      button:disabled { background: #9ca3af; cursor: default; }
      #status { margin-top: 10px; font-size: 12px; color: #333; min-height: 16px; }
    </style>
  </head>
  <body>
    <h1>Manga OCR Translator</h1>
    <label>Backend URL (your local server)</label>
    <input id="backend" value="http://localhost:8000" />
    <label>Tone</label>
    <select id="tone" style="width:100%; padding:5px; font-size:12px;">
      <option value="natural">Natural</option>
      <option value="literal">Literal</option>
      <option value="localized">Localized</option>
    </select>
    <label style="display:flex; align-items:center; gap:6px; margin-top:8px;">
      <input type="checkbox" id="honorifics" checked style="width:auto;" />
      Keep honorifics (-san, -nim, oppa)
    </label>
    <button id="go">Translate this page</button>
    <div id="status"></div>
    <script src="popup.js"></script>
  </body>
</html>
